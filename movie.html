<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white relative">

   <div class="bg-slate-600 w-10 h-10 rounded-full absolute top-10 left-10 flex items-center justify-center border-2 border-slate-900 hover:bg-slate-500 transition">
         <a href="movies.html" class="text-sm text-gray-400 hover:text-gray-200 transition">
            <svg  xmlns="http://www.w3.org/2000/svg" width="48" height="48"  class="text-white"
                fill="currentColor" viewBox="0 0 24 24" >
                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                <path d="M14.29 6.29 8.59 12l5.7 5.71 1.42-1.42-4.3-4.29 4.3-4.29z"></path>
                </svg>    
        </a>
    </div>
  <section id="hero" class="h-[60vh] bg-cover bg-no-repeat bg-center flex items-end p-8">
   
    <div class="bg-black bg-opacity-50 p-4 rounded">
      <h1 id="title" class="text-4xl font-bold"></h1>
      <p id="genre" class="text-white-300 mt-2 bg-slate-800 p-2 rounded text-center font-semibold"></p>
    </div>
  </section>

  <section class="p-8 flex gap-15">
    <img id="poster" class="rounded-lg shadow-lg w-[500px] h-[400px] object-contain bg-gray-900" />
     <div class="flex flex-col gap-8">
         <div>
            <h2 class="text-2xl font-semibold mb-4">Description</h2>
            <p id="description" class="text-gray-300"></p>
        </div>
        <div>
            <h2 class="text-2xl font-semibold mb-4">Release Date</h2>
            <p id="year" class="text-gray-300"></p>
        </div>
        <div >
            
                
            <h2 class="text-2xl font-semibold mb-4">
                Rating
            </h2>
            <div class="flex gap-2 " >
                <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"  class="text-yellow-500"
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="m6.87 14.33-1.83 6.4c-.12.4.03.84.37 1.08.34.25.8.26 1.14.02L12 18.2l5.45 3.63a.99.99 0 0 0 1.14-.02c.34-.25.49-.68.37-1.08l-1.83-6.4 4.54-4.08c.3-.27.41-.69.28-1.06-.13-.38-.47-.64-.87-.68l-5.7-.45-2.47-5.46a.998.998 0 0 0-1.82 0L8.62 8.06l-5.7.45c-.4.03-.74.3-.87.68s-.02.8.28 1.06z"></path>
                </svg>
                <p id="rating" class="text-gray-300"></p>
            </div>
        </div>
        <div>
            <h2 class="text-2xl font-semibold mb-4">Director</h2>
            <p id="director" class="text-gray-300"></p>
        </div>
        
     </div>
       

  </section>

  <!-- VIDEO PLAYER -->
  
  <div class="p-8">
            <h2 class="text-2xl font-semibold mb-4">Watch Movie </h2>

            <div class="relative w-full aspect-video rounded-lg overflow-hidden border-2 border-slate-700 bg-black">
                <iframe 
                    id="videoPlayer" 
                    class="absolute top-0 left-0 w-full h-full" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>

        </div>



  <script src="./js/movie.js"></script>

</body>
</html>
