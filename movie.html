<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <!-- HERO SECTION -->
  <section id="hero" class="h-[60vh] bg-cover bg-center flex items-end p-8">
    <div class="bg-black bg-opacity-50 p-4 rounded">
      <h1 id="title" class="text-4xl font-bold"></h1>
      <p id="genre" class="text-white-300 mt-2 bg-slate-800 p-2 rounded text-center font-semibold"></p>
    </div>
  </section>

  <!-- DETAILS -->
  <section class="p-8 grid md:grid-cols-2 gap-8">
    
    <!-- Poster -->
    <img id="poster" class="rounded-lg shadow-lg w-full" />

    <!-- Info -->
     <div>
         <div>
        <h2 class="text-2xl font-semibold mb-4">Description</h2>
        <p id="description" class="text-gray-300"></p>
        
        </div>
        
     </div>
       

  </section>

  <!-- VIDEO PLAYER -->
  
  <div class="p-8">
            <h2 class="text-2xl font-semibold mb-4">Watch Movie </h2>

            <div class="relative w-full aspect-video rounded-lg overflow-hidden border-2 border-slate-700 bg-black">
                <iframe 
                    id="videoPlayer" 
                    class="absolute top-0 left-0 w-full h-full" 
                    src="" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>

        </div>



  <script src="./js/movie.js"></script>

</body>
</html>
