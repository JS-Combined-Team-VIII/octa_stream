<!-- Walshak Movies Page -->
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="bg-black">

     <nav class="bg-[#1a1d27] p-4 mt-4 rounded-lg shadow-lg mx-10">
      <div class="flex items-center justify-between">

        <div class="flex items-center gap-4">
          <div class="w-9 h-9 bg-purple-600 rounded-lg flex items-center justify-center text-white font-bold">▶</div>
          <h1 class="font-bold text-lg text-white">Octa<span class="text-purple-400">Stream</span></h1>
        </div>

        <div class="hidden md:flex items-center gap-6">
          <ul class="flex gap-6 font-medium text-white">
            <li><a href="movies.html" class="text-purple-600">Home</a></li>
            <li><a href="#" class="hover:text-purple-600">Trending</a></li>
            <li><a href="#" class="hover:text-purple-600">Favorites</a></li>
          </ul>

          <input 
            type="text" 
            placeholder="Search movies..." 
            class="px-3 py-1 rounded-lg border border-purple-600 focus:outline-none focus:ring-2 focus:ring-purple-600 bg-gray-800 text-white"
          />
        </div>

        <!-- Hamburger button (mobile) -->
        <div class="md:hidden">
          <button id="menu-btn" class="text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Mobile menu -->
      <div id="mobile-menu" class="hidden text-white  flex-col gap-4 mt-4 md:hidden">
        <a href="movies.html" class="text-purple-600 font-medium">Home</a><br>
        <a href="#" class="hover:text-purple-600 font-medium">Trending</a><br>
        <a href="#" class="hover:text-purple-600 font-medium">Favorites</a><br>
        <input 
          type="text" 
          placeholder="Search movies..." 
          class="px-3 py-1 rounded-lg border border-purple-600  focus:outline-none focus:ring-2 focus:ring-purple-600 bg-gray-800 text-white"
        />
      </div>
    </nav>

    <!-- Movie Grid -->
    <main class="p-10 mt-20">
        <div id="moviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        </div>
    </main>
    <footer class="bg-[#1a1d27] text-white py-8 mt-12">
        <div class="max-w-[1400px] mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
    
            <!-- Logo / Brand -->
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center font-bold">▶</div>
                <h2 class="font-bold text-lg">Octa<span class="text-purple-400">Stream</span></h2>
            </div>
    
            <!-- Links -->
            <ul class="flex flex-col md:flex-row gap-4 font-medium text-gray-300 text-sm">
                <li><a href="movies.html" class="hover:text-purple-400 transition">Home</a></li>
                <li><a href="#" class="hover:text-purple-400 transition">Trending</a></li>
                <li><a href="#" class="hover:text-purple-400 transition">Favorites</a></li>
                <li><a href="#" class="hover:text-purple-400 transition">Contact</a></li>
            </ul>
    
            <!-- Copyright -->
            <p class="text-gray-400 text-sm mt-4 md:mt-0">&copy; 2026 OctaStream. All rights reserved.</p>
    
        </div>
    </footer>

    <script src="js/movies.js"></script>
</body>
</html>
